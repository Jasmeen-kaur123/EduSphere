<!-- Dashboard Section (dynamic) -->
<section id="dashboard" class="section active">
    <div class="section-header">
        <h1>Hi, Jasmeen</h1>
        <p>This is your HQ report so far</p>
    </div>
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-content">
                <div class="stat-number" id="statCourses">0</div>
                <div class="stat-label">Total Courses</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-content">
                <div class="stat-number" id="statStudents">0</div>
                <div class="stat-label">Total Students</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-content">
                <div class="stat-number" id="statAssignments">0</div>
                <div class="stat-label">Total Assignments</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-content">
                <div class="stat-number" id="statExams">0</div>
                <div class="stat-label">Total Exams</div>
            </div>
        </div>
    </div>
    <div class="dashboard-charts">
        <div class="chart-card">
            <div class="chart-header">
                <h3>Course Enrollment Trends</h3>
                <div class="chart-legend">
                    <span class="legend-item">📈 New Enrollments</span>
                </div>
            </div>
            <canvas id="performanceChart"></canvas>
        </div>
        <div class="chart-card quick-actions-card">
            <div class="chart-header">
                <h3>Quick actions</h3>
            </div>
            <div class="quick-actions-grid" id="quickActionsGrid">
                <button type="button" class="quick-action-btn" data-action="create-course">
                    <span class="quick-action-icon">📚</span>
                    <span class="quick-action-label">Create course</span>
                </button>
                <button type="button" class="quick-action-btn" data-action="create-exam">
                    <span class="quick-action-icon">📝</span>
                    <span class="quick-action-label">Create exam</span>
                </button>
                <button type="button" class="quick-action-btn" data-action="create-assignment">
                    <span class="quick-action-icon">✏️</span>
                    <span class="quick-action-label">Create assignment</span>
                </button>
                <button type="button" class="quick-action-btn" data-action="view-courses">
                    <span class="quick-action-icon">🎯</span>
                    <span class="quick-action-label">My courses</span>
                </button>
                <button type="button" class="quick-action-btn" data-action="view-students">
                    <span class="quick-action-icon">👥</span>
                    <span class="quick-action-label">Students</span>
                </button>
                <button type="button" class="quick-action-btn" data-action="view-assignments">
                    <span class="quick-action-icon">📌</span>
                    <span class="quick-action-label">Assignments</span>
                </button>
            </div>
        </div>
    </div>
</section>
