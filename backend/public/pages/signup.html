<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signup</title>
<link rel="stylesheet" href="/css/auth.css">
</head>

<body>

<div class="container">

<div class="left">

<h1>Create Account</h1>

<p>Already have an account? <a href="/pages/login.html">Login</a></p>

<form id="signupForm">

<label>Full Name</label>
<input type="text" id="username" placeholder="Enter name" required>

<label>Email</label>
<input type="email" id="email" placeholder="Enter email" required>

<label>Password</label>
<input type="password" id="password" placeholder="Enter password" required>

<label>Role</label>
<select id="role" required>
	<option value="">Select a role</option>
	<option value="admin">Admin</option>
	<option value="instructor">Instructor</option>
	<option value="student">Student</option>
</select>

<button class="btn">Create Account</button>

<p id="error" style="color:red;margin-top:10px;"></p>

</form>

</div>

<div class="right">

<div class="brand">

<h1>EduSphere</h1>
<p>Learn. Grow. Succeed.</p>

</div>

</div>

</div>

<script>
const signupForm = document.getElementById("signupForm");

signupForm.addEventListener("submit", async function(e){
	e.preventDefault();

	const name = document.getElementById("username").value;
	const email = document.getElementById("email").value;
	const password = document.getElementById("password").value;
	const role = document.getElementById("role").value;

	try {
		const res = await fetch("/api/auth/signup", {
			method: "POST",
			headers: {
				"Content-Type": "application/json"
			},
			body: JSON.stringify({ username: name, email, password, role })
		});

		const data = await res.json();

		if (data.success) {
			// Redirect based on role
			if (role === 'admin') {
				// Store token if available
				localStorage.setItem('token', data.token || '');
				localStorage.setItem('role', 'admin');
				window.location.href = '/admin-dashboard.html';
			} else if (role === 'instructor') {
				localStorage.setItem('token', data.token || '');
				localStorage.setItem('role', 'instructor');
				window.location.href = '/instructor-dashboard/index.html';
			} else {
				// Student - go to login
				window.location.href = "/pages/login.html";
			}
			return;
		}

		document.getElementById("error").innerText = data.message || "Signup failed";
	} catch (err) {
		document.getElementById("error").innerText = "Server error";
	}
});
</script>
</body>
</html>
