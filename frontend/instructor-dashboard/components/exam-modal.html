<!-- Exam Modal (missing in index.html) -->
<div id="examModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Create Exam</h2>
      <button class="modal-close">&times;</button>
    </div>
    <form id="examForm">
      <input type="hidden" id="examId" value="">
      <div class="form-group">
        <label for="examTitle">Title</label>
        <input type="text" id="examTitle" required>
      </div>
      <div class="form-group">
        <label for="examDate">Date</label>
        <input type="date" id="examDate" required>
      </div>
      <div class="form-group">
        <label for="examTime">Time</label>
        <input type="time" id="examTime" required>
      </div>
      <div class="form-group">
        <label for="examDuration">Duration (minutes)</label>
        <input type="number" id="examDuration" required>
      </div>
      <div class="form-group">
        <label for="examTotalMarks">Total Marks</label>
        <input type="number" id="examTotalMarks" required>
      </div>
      <div class="form-group">
        <label for="passingScore">Passing Score</label>
        <input type="number" id="passingScore" required>
      </div>
      <div class="form-group">
        <label for="examCourse">Course</label>
        <select id="examCourse"></select>
      </div>
      <div class="form-group">
        <label>Questions</label>
        <div id="examQuestionsContainer"></div>
        <button type="button" id="addExamQuestionBtn" class="btn-secondary">+ Add Question</button>
      </div>
      <div class="form-actions">
        <button type="button" class="btn-secondary modal-close-btn">Cancel</button>
        <button type="submit" class="btn-primary">Create Exam</button>
      </div>
    </form>
  </div>
</div>
