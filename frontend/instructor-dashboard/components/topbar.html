<!-- Topbar for EduSphere Instructor Dashboard -->
<div class="topbar">
    <div class="search-box">
        <input type="text" placeholder="Search anything...">
        <span class="search-icon">🔍</span>
    </div>
    <div class="topbar-right">
        <div class="notification-bell" id="notificationBell" style="cursor: pointer;">
            <span class="bell-icon">🔔</span>
            <span class="badge" id="notificationCount">0</span>
        </div>
        <div class="user-profile" id="profileNav" style="cursor: pointer;">
            <img src="https://ui-avatars.com/api/?name=Jasmeen&background=6C4AB6&color=fff" alt="Profile">
            <span class="user-name">Jasmeen</span>
        </div>
    </div>
</div>
