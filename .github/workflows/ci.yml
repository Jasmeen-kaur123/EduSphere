name: LMS CI Pipeline

on:
  push:
    branches:
      - main
      - manjot-student
      - cicd-pipeline

  pull_request:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # ROOT DEPENDENCIES

      - name: Install Root Dependencies
        run: npm install

      # FRONTEND

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

      # BACKEND

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install